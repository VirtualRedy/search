<!DOCTYPE html>
<html lang="en">
    <head>
        <title>AdvancedSearch</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0" crossorigin="anonymous">
    </head>
    <body>
        <div class="topContainer">
            <style>
                div[class="row"] {
                    display: flex;
                    flex-wrap: nowrap;
                    align-items: center;
                    margin: 15px
                }

                .logoCol {
                    width: auto;
                }
                .linksCol {
                    flex: 1;
                    text-align: right;
                }
                a {
                    padding:10px;
                    font-family: Arial, sans-serif;
                    font-size: small;
                    text-decoration: none;
                    text-decoration-color: rgb(37, 37, 37);
                }
                a:hover {
                    text-decoration: underline;
                }

            </style>
            <div class="row">
                <div class="logoCol">
                    <img id="brandLogo" src="google logo.png" alt="google logo" width="74px" height="24px">
                </div>
                
                <div class="linksCol">
                    <a href="imageSearch.htm">Image</a>
                    <a href="advancedSearch.htm">Advanced</a>
                    <a href="index.htm">Google</a>
                </div>
            </div>
        </div>
        <div class="label">
            <style>
                .label {
                    margin-top: 35px;
                    margin-right: 35px;
                    margin-bottom: 25px;
                    margin-left: 65px;
                    color: #d93025;
                    font-size: 20px;
                    font-family: Arial, Helvetica, sans-serif;
                }
            </style>
            <label>Advanced Search</label>
            <hr style="color: gray;">
        </div>

        <form class="advSearch" action="https://google.com/search">
            <style>
                .advSearch {
                    font-family: Arial, sans-serif;
                    margin-left: 65px;
                    margin-top: 40px;
                    font-size: 13px;
                }
            
                #extra-text {
                    font-size: x-small;
                }


            </style>

            <div class="row">
                <style>
                    #header-label {
                        font-size: 16px;
                    }
                </style>
                <div class="col" id="header-label">
                    <label>Find pages with...</label>
                </div>
                <div class="col-6">
                </div>
                <div class="col" id="header-label">
                    To do this in the search box.
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label class="form-label">all these words:</label>
                </div>
                <div class="col-6">
                    <input type="text" name="as_q" size="80">
                </div>
                <div class="col" id="extra-text">
                    Type the important words: tri-colour rat terrier
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label class="form-label">this exact word or phrase:</label>
                </div>
                <div class="col-6">
                    <input type="text" name="as_epq" size="80">
                </div>
                <div class="col" id="extra-text">
                    Put exact words in quotes: "rat terrier"
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>any of these words</label>
                </div>
                <div class="col-6">
                    <input type="text" name="as_oq" size="80">
                </div>
                <div class="col" id="extra-text">
                    Type OR between all the words you want: miniature OR standard
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>none of these words</label>
                </div>
                <div class="col-6">
                    <input type="text" name="as_eq" size="80"> 
                </div>
                <div class="col" id="extra-text">
                    Put a minus sign just before words that you don't want: -rodent, -"Jack Russell"
                </div>
            </div>

            <div class="row">
                <style>
                    #advSearchButton {
                        border-radius: 2px;
                        background-color: #4d90fe;
                        color: white;
                        font-size: 11px;
                        font-weight: bold;
                        text-align: center;
                        white-space: nowrap
                    }
                </style>
                <div class="col">
                </div>
                <div class="col-6" style="text-align: end;">
                    <input id="advSearchButton" type="submit" value="Advanced Search">
                </div>
                <div class="col">
                </div>
            </div>
        </form>
    </body>
</html>
